<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title">
  <title id="title">YKN TV</title>
  <defs>
    <linearGradient id="bg" x1="130" y1="110" x2="894" y2="914" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171717"/>
      <stop offset="1" stop-color="#020202"/>
    </linearGradient>
    <linearGradient id="gold" x1="578" y1="400" x2="906" y2="612" gradientUnits="userSpaceOnUse">

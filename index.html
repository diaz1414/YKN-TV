  <style>
    /* Splash loader bawaan HTML sebelum React selesai di-render (Biar user gak ngeliat layar hitam kosong) */
    html {
      background-color: #020202;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #020202;
      z-index: 99999;
      transition: opacity 0.4s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(212, 175, 55, 0.1);
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ============================================================
     * FULLSCREEN LANDSCAPE FIX FOR MOBILE
     * Forces the video player container to fill the entire screen
     * in landscape orientation when entering fullscreen on iOS/Android
     * ============================================================ */

    /* Standard */
    :fullscreen {
      width: 100vw !important;
      height: 100vh !important;
      background: #000 !important;
    }

    /* WebKit (Safari iOS, Chrome Android) */
    :-webkit-full-screen {
      width: 100vw !important;
      height: 100vh !important;
      background: #000 !important;
    }

    /* Mozilla */
    :-moz-full-screen {
      width: 100vw !important;
      height: 100vh !important;
      background: #000 !important;
    }

    /* Ensure video element fills the fullscreen container */
    :fullscreen video,
    :-webkit-full-screen video,
    :-moz-full-screen video {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
    }

    /* On mobile, when in fullscreen, rotate to landscape if portrait */
    @media screen and (max-width: 768px) {
      :fullscreen,
      :-webkit-full-screen {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 9999 !important;
        background: #000 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }
    }
  </style>
</head>

<body>
  <div id="initial-loader">
    <div class="spinner"></div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('initial-loader');
      if (loader) {
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => loader.remove(), 400);
        }, 300);
      }
    });
  </script>
</body>

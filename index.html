  <style>
    /* Splash loader bawaan HTML sebelum React selesai di-render (Biar user gak ngeliat layar hitam kosong) */
    html {
      background-color: #020202;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #020202;
      z-index: 99999;
      transition: opacity 0.4s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(212, 175, 55, 0.1);
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ============================================================
     * FULLSCREEN LANDSCAPE FIX FOR MOBILE
     * Forces the video player container to fill the entire screen
     * in landscape orientation when entering fullscreen on iOS/Android
     * ============================================================ */

    /* Standard */
    :fullscreen {
      width: 100vw !important;
      height: 100vh !important;
      background: #000 !important;
    }

    /* WebKit (Safari iOS, Chrome Android) */
    :-webkit-full-screen {
      width: 100vw !important;
      height: 100vh !important;
      background: #000 !important;
    }

    /* Mozilla */
    :-moz-full-screen {
      width: 100vw !important;
      height: 100vh !important;
      background: #000 !important;
    }

    /* Ensure video element fills the fullscreen container */
    :fullscreen video,
    :-webkit-full-screen video,
    :-moz-full-screen video {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
    }

    /* On mobile, when in fullscreen, rotate to landscape if portrait */
    @media screen and (max-width: 768px) {

      :fullscreen,
      :-webkit-full-screen {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 9999 !important;
        background: #000 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }
    }

    /* Block printing / print-to-PDF screenshot */
    @media print {
      body {
        display: none !important;
      }
    }

    /* --- YKN TV Toast Notification Styles --- */
    .ykn-toast-container {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      z-index: 100000;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
    }

    .ykn-toast-container.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .ykn-toast {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(18, 18, 18, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      padding: 12px 24px 12px 20px;
      border-radius: 16px;
      max-width: 90vw;
      width: max-content;
    }

    .ykn-toast-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: rgba(212, 175, 55, 0.15);
      border-radius: 50%;
      color: #d4af37;
      flex-shrink: 0;
    }

    .ykn-toast-content {
      display: flex;
      flex-direction: column;
    }

    .ykn-toast-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #ffffff;
      margin: 0 0 2px 0;

    .ykn-toast-desc {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 12px;
      color: #a1a1aa;
      margin: 0;
    }

    /* Shake animation on trigger */
    .ykn-shake {
      animation: ykn-shake-anim 0.4s ease-in-out;
    }

    @keyframes ykn-shake-anim {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      20%,
      60% {
        transform: translateX(-52%) translateY(0);
      }

      40%,
      80% {
        transform: translateX(-48%) translateY(0);
      }

    /* Restore initial loader on DOMContentLoaded */
    window.addEventListener('DOMContentLoaded', function () {
      var loader = document.getElementById('initial-loader');
      if (loader) {
        setTimeout(function () {
          loader.style.opacity = '0';
          setTimeout(function () { loader.remove(); }, 400);
        }, 300);
      }
    });
  </script>

  <script>
    // ╔══════════════════════════════════════════════════════════╗
    // ║           YKN TV — SITE PROTECTION LAYER v1             ║
    // ║  Anti-scrape · Anti-devtools · Anti-iframe · Anti-copy  ║
    // ╚══════════════════════════════════════════════════════════╝

    (function () {
      'use strict';

      var _host = window.location.hostname;
      var _isLocal = _host === 'localhost' || _host === '127.0.0.1' || _host.startsWith('192.168.');

      function isDevBypassed() {
        if (_isLocal) return true;
        var _role = localStorage.getItem('ykn_admin_role') || sessionStorage.getItem('ykn_admin_role');
        var _isAdminLogged = localStorage.getItem('ykn_admin_logged_in') === 'true' || sessionStorage.getItem('ykn_admin_logged_in') === 'true';
        return _role === 'developer' || _role === 'admin' || _isAdminLogged;
      }

      // ── Anti-copy protection with premium toast notification ──────────────────
      var toastContainer;
      var toastTimeout;

      function createToast() {
        if (toastContainer) return;
        toastContainer = document.createElement('div');
        toastContainer.className = 'ykn-toast-container';
        toastContainer.innerHTML = `
          <div class="ykn-toast">
            <div class="ykn-toast-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </div>
            <div class="ykn-toast-content">
              <h4 class="ykn-toast-title">Konten Dilindungi</h4>
              <p class="ykn-toast-desc">Teks tidak diperbolehkan disalin di YKN TV.</p>
            </div>
          </div>
        `;
        document.body.appendChild(toastContainer);
      }

      function showCopyToast() {
        createToast();
        // Reset classes
        toastContainer.classList.remove('show', 'ykn-shake');

        // Trigger reflow to restart animation
        void toastContainer.offsetWidth;

        // Show and shake
        toastContainer.classList.add('show', 'ykn-shake');

        // Clear previous timeout and set new one
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(function () {
          toastContainer.classList.remove('show');
        }, 2500);

        // Remove shake class after animation completes
        setTimeout(function () {
          toastContainer.classList.remove('ykn-shake');
        }, 400);
      }

      document.addEventListener('copy', function (e) {
        if (isDevBypassed()) return;
        if (e.clipboardData) {
          e.clipboardData.setData('text/plain', '© YKN TV — Konten ini dilindungi hak cipta.');
          e.preventDefault();
        }
        showCopyToast();
      });

      // ── 0. Production-only guard — skip ALL other protections on localhost & for developers ─
      if (isDevBypassed()) return;

      // ── 1. Anti-iframe: prevent embedding in foreign sites ──────
      if (window.top !== window.self) {
        document.documentElement.style.display = 'none';
        window.top.location.replace(window.self.location.href);
      }

      function isDesktopLikeDevice() {
        var ua = navigator.userAgent || '';
        var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
        var hasDesktopPointer = window.matchMedia && window.matchMedia('(hover: hover) and (pointer: fine)').matches;
        return hasDesktopPointer || !isMobile;
      }

      function redirectInspectAttempt(forceRedirect) {
        if (!isDesktopLikeDevice()) return;
        if (typeof window.yknAdRedirect === 'function') {
          window.yknAdRedirect(forceRedirect === true);
        }
      }

      // ── 2. Disable right-click context menu ─────────────────────
      document.addEventListener('contextmenu', function (e) {
        if (isDevBypassed()) return;
        e.preventDefault();
        redirectInspectAttempt(true);
        return false;
      });

      // ── 3. Block keyboard inspector shortcuts ───────────────────
      document.addEventListener('keydown', function (e) {
        if (isDevBypassed()) return;
        var key = e.key || '';
        var lowerKey = key.toLowerCase();
        var isCtrlInspectCombo = e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(lowerKey);
        var isMacInspectCombo = e.metaKey && e.altKey && ['i', 'j', 'c'].includes(lowerKey);
        var isBlockedUtilityCombo = (e.ctrlKey || e.metaKey) && ['u', 's', 'p'].includes(lowerKey);
        var isContextMenuKey = key === 'ContextMenu' || (e.shiftKey && key === 'F10');
        // F12
        if (key === 'F12') { e.preventDefault(); redirectInspectAttempt(); return false; }
        // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C (DevTools)
        if (isCtrlInspectCombo || isMacInspectCombo) {
          e.preventDefault(); redirectInspectAttempt(); return false;
        }
        // Ctrl+U (View Source)
        if (isBlockedUtilityCombo) {
          e.preventDefault(); redirectInspectAttempt(); return false;
        }
        // Keyboard context menu
        if (isContextMenuKey) {
          e.preventDefault(); redirectInspectAttempt(); return false;
        }
      });

      // ── 4. DevTools size detection (desktop only) ───────────────
      var _devToolsThreshold = 160;
      var _devToolsOpen = false;

      function _checkDevTools() {
        if (isDevBypassed()) return;
        var widthDiff = window.outerWidth - window.innerWidth;
        var heightDiff = window.outerHeight - window.innerHeight;
        var isOpen = widthDiff > _devToolsThreshold || heightDiff > _devToolsThreshold;

        if (isOpen && !_devToolsOpen) {
          _devToolsOpen = true;
          console.clear();
          console.log('%c⛔ YKN TV — AKSES DILARANG', 'color:#d4af37;font-size:32px;font-weight:900;');
          console.log('%cHalaman ini dilindungi. Aktivitas mencurigakan telah terdeteksi dan dicatat.', 'color:#ef4444;font-size:14px;font-weight:bold;');
          console.log('%c© 2026 YKN TV. Dilindungi Oleh YKN TV.', 'color:#71717a;font-size:11px;');
        } else if (!isOpen) {
          _devToolsOpen = false;
        }
      }

      // ── 5. Clear console continuously when DevTools is open ─────
      setInterval(function () {
        if (isDevBypassed()) return;
        _checkDevTools();
        if (_devToolsOpen) {
          console.clear();
        }
      }, 1000);

      // ── 6. Debugger trap (slows down automated inspection) ──────
      // Runs only in production (not localhost)
      if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        setInterval(function () {
          if (isDevBypassed()) return;
          (function () {
            return false;
          }.toString().includes('devtools'));
        }, 100);
      }


      // ── 8. Disable drag (prevents dragging images/links) ────────
      document.addEventListener('dragstart', function (e) {
        if (isDevBypassed()) return;
        e.preventDefault();
        return false;
      });

      // ── 9. Disable print screen via CSS in print media ──────────
      // (handled via @media print in CSS)

      // ── 10. Console warning for curious devs ────────────────────
      setTimeout(function () {
        if (isDevBypassed()) return;
        console.clear();
        console.log('%c⚠ Perhatian!', 'color:#f59e0b;font-size:24px;font-weight:900;');
        console.log('%cJika seseorang menyuruh Anda mengetik/paste sesuatu di sini, itu adalah penipuan.', 'color:#ef4444;font-size:13px;font-weight:bold;');
        console.log('%c© 2026 YKN TV — Diproteksi. Segala bentuk scraping & reverse engineering dilarang.', 'color:#71717a;font-size:11px;');
      }, 500);

    })();
  </script>
